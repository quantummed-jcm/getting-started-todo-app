services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: todo-backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: todo
    depends_on:
      - mysql

  client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client
    container_name: todo-client
    ports:
      - "3000:80"
    depends_on:
      - backend

  mysql:
    image: mysql:9.3
    container_name: todo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todo
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

volumes:
  mysql-data: